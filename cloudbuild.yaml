steps:
  # Step 1: Download CSV from GCS bucket
  - name: 'gcr.io/cloud-builders/gsutil'
    args: ['cp', 'gs://ecotransparencia2/areas_embargadas.csv', 'docs/ibama/areas_embargadas.csv']

  # Step 2: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/ecotransparencia-api:$COMMIT_SHA', '.']

  # Step 3: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ecotransparencia-api:$COMMIT_SHA']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ecotransparencia-api'
      - '--image=gcr.io/$PROJECT_ID/ecotransparencia-api:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=QUARKUS_PROFILE=prod'

images:
  - 'gcr.io/$PROJECT_ID/ecotransparencia-api:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
