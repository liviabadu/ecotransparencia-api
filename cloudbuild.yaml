# Cloud Build pipeline para EcoTransparencia API
#
# Pre-requisitos (one-time, ver README):
#   - Cloud SQL Postgres 16 + PostGIS provisionado (instancia _DB_INSTANCE)
#   - Secret Manager: secret 'db-password' acessivel pela SA do Cloud Run
#   - Artifact Registry: repo _REPO criado em _REGION
#   - GCS bucket _DATA_BUCKET com layout espelhando docs/ local:
#       gs://_DATA_BUCKET/ibama/areas_embargadas.csv
#       gs://_DATA_BUCKET/ibama/autos/auto_infracao_ano_*.csv
#       gs://_DATA_BUCKET/adm_publica/*.csv
#       gs://_DATA_BUCKET/mte/tr_escravo.csv
#       gs://_DATA_BUCKET/icmbio/{*.xlsx, autos_infracao_icmbio_shp/*, embargos_icmbio_shp/*}
#
# Override de substitutions:
#   gcloud builds submit --substitutions=_MEMORY=1Gi,_TIMEOUT=300

substitutions:
  _REGION: southamerica-east1
  _REPO: ecotransparencia
  _IMAGE: ecotransparencia-api
  _DB_INSTANCE: ecotransparencia-db
  _DB_NAME: ecotransparencia
  _DB_USER: app-user
  _DATA_BUCKET: ecotransparencia2
  # 1o deploy: 2Gi/900s p/ carregar ~852k registros. Subsequentes: pode reduzir.
  _MEMORY: 2Gi
  _TIMEOUT: '900'

steps:
  # 1. Baixa todas as fontes do GCS espelhando layout local
  - id: download-data
    name: 'gcr.io/cloud-builders/gsutil'
    args:
      - '-m'
      - 'rsync'
      - '-r'
      - 'gs://${_DATA_BUCKET}/'
      - './docs/'

  # 2. Build da imagem (multi-stage Dockerfile)
  - id: build
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest'
      - '.'

  # 3. Push para Artifact Registry
  - id: push
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}'

  # 4. Deploy no Cloud Run com Cloud SQL connector + Secret Manager
  - id: deploy
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_IMAGE}'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=${_MEMORY}'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--timeout=${_TIMEOUT}'
      - '--add-cloudsql-instances=$PROJECT_ID:${_REGION}:${_DB_INSTANCE}'
      - '--set-env-vars=QUARKUS_PROFILE=prod,DB_URL=jdbc:postgresql:///${_DB_NAME}?host=/cloudsql/$PROJECT_ID:${_REGION}:${_DB_INSTANCE},DB_USER=${_DB_USER}'
      - '--update-secrets=DB_PASSWORD=db-password:latest'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  # Build da app + GeoTools/POI deps + dump de ~700 MB precisam de espaco e CPU
  machineType: E2_HIGHCPU_8
  diskSizeGb: 100

timeout: 1800s
