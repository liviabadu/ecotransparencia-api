# =============================================================================
# EcoTransparencia API - Application Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# HTTP Server Configuration (Cloud Run compatibility)
# -----------------------------------------------------------------------------
# Cloud Run injects PORT env var - use it, default to 8080
quarkus.http.port=${PORT:8080}
quarkus.http.host=0.0.0.0

# -----------------------------------------------------------------------------
# Default Datasource (H2 for dev/test)
# -----------------------------------------------------------------------------
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:ecotransparencia;DB_CLOSE_DELAY=-1;MODE=MySQL

# Hibernate ORM
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

# -----------------------------------------------------------------------------
# Production Profile (H2 in-memory for now, MySQL later)
# -----------------------------------------------------------------------------
%prod.quarkus.datasource.db-kind=h2
%prod.quarkus.datasource.username=sa
%prod.quarkus.datasource.password=
%prod.quarkus.datasource.jdbc.url=jdbc:h2:mem:ecotransparencia;DB_CLOSE_DELAY=-1;MODE=MySQL

%prod.quarkus.hibernate-orm.database.generation=drop-and-create
%prod.quarkus.hibernate-orm.log.sql=false

# -----------------------------------------------------------------------------
# Dev Profile
# -----------------------------------------------------------------------------
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.log.sql=true

# -----------------------------------------------------------------------------
# Test Profile
# -----------------------------------------------------------------------------
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:ecotransparencia-test;DB_CLOSE_DELAY=-1;MODE=MySQL
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.log.sql=false
%test.app.data.load-on-startup=false

# -----------------------------------------------------------------------------
# IBAMA Data Loading (US-INFRA-001)
# -----------------------------------------------------------------------------
# Enable automatic data loading on startup
app.data.load-on-startup=false

# Path to IBAMA CSV file
app.data.csv-path=docs/ibama/areas_embargadas.csv

# Dev profile: enable data loading
%dev.app.data.load-on-startup=true

# Prod profile: disable automatic loading (use migration scripts)
%prod.app.data.load-on-startup=false

# -----------------------------------------------------------------------------
# OpenAPI / Swagger UI (US-INFRA-002)
# -----------------------------------------------------------------------------
quarkus.smallrye-openapi.info-title=EcoTransparencia API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API para consulta de entidades com areas embargadas pelo IBAMA. \
  Permite buscar pessoas fisicas e juridicas que possuem registros de embargo ambiental.
quarkus.smallrye-openapi.info-contact-name=EcoTransparencia Team
quarkus.smallrye-openapi.info-license-name=Apache 2.0
quarkus.smallrye-openapi.info-license-url=https://www.apache.org/licenses/LICENSE-2.0

# Swagger UI: habilitado em todos os ambientes
quarkus.swagger-ui.always-include=true
