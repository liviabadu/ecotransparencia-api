# =============================================================================
# Test Configuration
# =============================================================================

quarkus.http.test-port=8081

# H2 in-memory database for tests
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:ecotransparencia-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;INIT=CREATE ALIAS IF NOT EXISTS H2GIS_SPATIAL FOR 'org.h2gis.functions.factory.H2GISFunctions.load'\\;CALL H2GIS_SPATIAL()

# Hibernate ORM - recreate schema for each test run
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# Flyway disabled in tests (Phase A: H2 path keeps boot-CSV-load semantics)
quarkus.flyway.enabled=false
